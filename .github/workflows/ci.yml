name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: tree-sitter (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli@0.26
      - name: Generate parser
        run: tree-sitter generate
      - name: Run corpus + highlight tests
        run: tree-sitter test

  cargo:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli@0.26
      - name: Generate parser
        run: tree-sitter generate
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check
