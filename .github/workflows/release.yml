name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wasm:
    name: Build tree-sitter-vba.wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli@0.26
      - name: Generate parser
        run: tree-sitter generate
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
      - name: Build WASM
        run: tree-sitter build --wasm --output tree-sitter-vba.wasm
      # Grammar validation lives in CI (.github/workflows/ci.yml)
      # where `tree-sitter test` + `cargo test` run across 3 OSes.
      # `tree-sitter build --wasm` above is itself a generate+compile
      # smoke; duplicating `tree-sitter test` here hits the known
      # tree-sitter-cli 0.26 locals-runner OOM until 0.27 lands.
      - uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-vba-wasm
          path: tree-sitter-vba.wasm
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tree-sitter-vba.wasm
